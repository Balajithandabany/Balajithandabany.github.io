<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesys Integration Web</title>

  <script type="text/javascript" charset="utf-8">
    (function (g, e, n, es, ys) {
      g['_genesysJs'] = e;
      g[e] = g[e] || function () {
        (g[e].q = g[e].q || []).push(arguments)
      };
      g[e].t = 1 * new Date();
      g[e].c = es;
      ys = document.createElement('script');
      ys.async = 1;
      ys.src = n;
      ys.charset = 'utf-8';
      document.head.appendChild(ys);
    })(window, 'Genesys', 'https://apps.usw2.pure.cloud/genesys-bootstrap/genesys.min.js', {
      environment: 'prod-usw2',
      deploymentId: '7ca07e94-3766-4b49-8f8e-897a4bb0e31a'
    });
  </script>

  <!-- ADD THIS BLOCK -->
  <script>
    Genesys("subscribe", "Journey.ready", function () {
      console.log("Journey ready");

      Genesys("command", "Journey.pageview", {
        pageTitle: document.title,
        pageLocation: window.location.href
      });

      Genesys("command", "Journey.record", {
        eventName: "balaji_step1_test"
      });

      console.log("Journey pageview + record sent");
    });

    Genesys("subscribe", "Messenger.ready", function () {
      console.log("Messenger ready");
    });
  </script>
</head>
<body>
  <div id="genesys-support-center"></div>

  <h1>Genesys Integration Web</h1>
  <button id="testJourneyBtn">Send Journey Test Event</button>

  <!-- OPTIONAL STEP 2 -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("testJourneyBtn");

      if (btn) {
        btn.addEventListener("click", function () {
          Genesys("command", "Journey.record", {
            eventName: "balaji_button_click_test",
            customAttributes: {
              page: window.location.pathname,
              source: "github-pages"
            }
          });

          console.log("Button Journey.record sent");
        });
      }
    });
  </script>
</body>
</html>
