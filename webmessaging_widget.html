<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesys Journey Test</title>

  <!-- Genesys Messenger Snippet -->
  <script type="text/javascript" charset="utf-8">
    (function (g, e, n, es, ys) {
      g['_genesysJs'] = e;
      g[e] = g[e] || function () {
        (g[e].q = g[e].q || []).push(arguments);
      };
      g[e].t = 1 * new Date();
      g[e].c = es;
      ys = document.createElement('script');
      ys.async = 1;
      ys.src = n;
      ys.charset = 'utf-8';
      document.head.appendChild(ys);
    })(window, 'Genesys', 'https://apps.usw2.pure.cloud/genesys-bootstrap/genesys.min.js', {
      environment: 'prod-usw2',
      deploymentId: '7ca07e94-3766-4b49-8f8e-897a4bb0e31a'
    });
  </script>

  <!-- Journey Test Script -->
  <script>
    Genesys("subscribe", "Journey.ready", function () {
      console.log("✅ Journey ready");

      // 1️⃣ Send pageview
      Genesys("command", "Journey.pageview", {
        pageTitle: document.title,
        pageLocation: window.location.href,
        customAttributes: {
          testPage: "github"
        }
      });
      console.log("✅ Journey pageview sent");

      // 2️⃣ Send custom event
      Genesys("command", "Journey.record", {
        eventName: "balaji_console_step2",
        customAttributes: {
          source: "github-pages",
          page: window.location.pathname,
          env: "test"
        }
      });
      console.log("✅ Journey test event sent");
    });

    // Messenger ready (sanity check)
    Genesys("subscribe", "Messenger.ready", function () {
      console.log("✅ Messenger ready");
    });

    // 3️⃣ Listen for qualification events (from Predictive Engagement)
    Genesys("subscribe", "Journey.qualifiedWebMessagingOffer", function (data) {
      console.log("✅ Qualified web messaging offer", data);
    });

    Genesys("subscribe", "Journey.qualifiedContentOffer", function (data) {
      console.log("✅ Qualified content offer", data);
    });

    Genesys("subscribe", "Journey.qualifiedOpenAction", function (data) {
      console.log("✅ Qualified open action", data);
    });
  </script>

</head>

<body>
  <h1>Genesys Journey Step 2 Test</h1>
  <p>Open Console (F12) to verify events.</p>
</body>
</html>
