<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesys Journey Multi Event Test</title>

  <!-- Genesys Snippet -->
  <script type="text/javascript" charset="utf-8">
    (function (g, e, n, es, ys) {
      g['_genesysJs'] = e;
      g[e] = g[e] || function () {
        (g[e].q = g[e].q || []).push(arguments);
      };
      g[e].t = 1 * new Date();
      g[e].c = es;
      ys = document.createElement('script');
      ys.async = 1;
      ys.src = n;
      ys.charset = 'utf-8';
      document.head.appendChild(ys);
    })(window, 'Genesys', 'https://apps.usw2.pure.cloud/genesys-bootstrap/genesys.min.js', {
      environment: 'prod-usw2',
      deploymentId: '7ca07e94-3766-4b49-8f8e-897a4bb0e31a'
    });
  </script>

  <!-- Multi Event Test -->
  <script>
    Genesys("subscribe", "Journey.ready", function () {
      console.log("✅ Journey ready");

      // Pageview
      Genesys("command", "Journey.pageview", {
        pageTitle: document.title,
        pageLocation: window.location.href
      });
      console.log("✅ Pageview sent");

      // 🔹 List of mixed event names
      const events = [
        // ✅ Working formats
        "test_event_one",
        "repeated_product_view",
        "demo_requested",
        "checkout_started",

        // ❌ Likely problematic formats
        "3108 TEST repeated_product_view",
        "9999 TEST repeated_product_view",
        "TEST EVENT ONE",
        "1234 checkout started",
        "TEST_checkout MIXED 123",
        "4567 DEMO REQUEST"
      ];

      // Fire all events
      events.forEach((eventName, index) => {
        setTimeout(() => {
          Genesys("command", "Journey.record", {
            eventName: eventName,
            customAttributes: {
              index: index,
              format: "test",
              source: "github-pages"
            }
          });

          console.log(`📤 Sent event: ${eventName}`);
        }, index * 500); // small delay so they don't fire at exact same time
      });

    });

    Genesys("subscribe", "Messenger.ready", function () {
      console.log("✅ Messenger ready");
    });

    Genesys("subscribe", "Journey.qualifiedWebMessagingOffer", function (data) {
      console.log("🎯 Qualified web messaging offer", data);
    });

  </script>
</head>

<body>
  <h1>Genesys Journey Multi Event Test</h1>
  <p>Open Console (F12) and check Live Now.</p>
</body>
</html>
